<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philip's Playground</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
  
    <h>Philip's Playground</h>
  
    <div class="nav-grid">
      <div class="nav-item" id="qrButton">
        <i data-lucide="qr-code" size="32"></i>
        <span class="label">My QRs</span>
      </div>
      
      <div class="nav-item" id="gamesButton">
        <i data-lucide="gamepad-2" size="32"></i>
        <span class="label">Games (WIP)</span>
      </a>
    </div>
  
    <div class="modal-overlay" id="qr-modal">
      <div class="qr-panel">
        <button class="close-btn" id="closeButton">
          <i data-lucide="x-circle"></i>
        </button>
        <h2 style="color: var(--neon-white); letter-spacing: 3px;">QR List</h2>
        <p style="font-size: 0.8rem; opacity: 0.6;">Select an account:</p>
        
        <div class="db-grid">
          <div class="bank-item" id="bdo">
            <span class="label">BDO</span>
          </div>
          <div class="bank-item" id="unionbank">
            <span class="label">UnionBank</span>
          </div>
          <div class="bank-item" id="bpi">
            <span class="label">BPI</span>
          </div>
          <div class="bank-item" id="gcash">
            <span class="label">GCash</span>
          </div>
          <div class="bank-item" id="maya">
            <span class="label">Maya</span>
          </div>
          <div class="bank-item" id="maribank">
            <span class="label">Maribank</span>
          </div>
          <div class="bank-item" id="tonik">
            <span class="label">Tonik</span>
          </div>
          <div class="bank-item" id="unodigital">
            <span class="label">UNO Digital</span>
          </div>
          <div class="bank-item" id="gotyme">
            <span class="label">GoTyme</span>
          </div>
          <div class="bank-item" id="cimb">
            <span class="label">CIMB</span>
          </div>
        </div>
      </div>
      <div class="modal-overlay" id="bank-modal">
        <div class="bank-qr" id="bdo-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/9724025d.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="unionbank-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/0ca5bd70.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="bpi-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/image01.jpg?v=650f70ea"></img>
        </div>
        <div class="bank-qr" id="gcash-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/e1193292.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="maya-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/87179ed1.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="maribank-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/6a6ed2b3.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="tonik-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/1dceb22a.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="unodigital-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/a3f4a358.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="gotyme-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/a2fa28e2.jpg?v=7230beb9"></img>
        </div>
        <div class="bank-qr" id="cimb-qr">
          <button class="close-btn" id="closeqr">
            <i data-lucide="x-circle"></i>
          </button>
          <img src="https://philippati-qr.carrd.co/assets/images/gallery01/d26eac0a.jpg?v=7230beb9"></img>
        </div>
      </div>
    </div>
  
    <script src="script.js"></script>
  </body>
</html>
